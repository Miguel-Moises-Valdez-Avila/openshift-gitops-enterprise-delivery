apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: el-web-build-route
  namespace: demo
spec:
  to:
    kind: Service
    name: el-web-build-listener # El nombre siempre empieza con "el-" + nombre del listener
    weight: 100
  port:
    targetPort: http-listener
  tls:
    termination: edge # Para que use HTTPS