apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: demo-database
  namespace: openshift-gitops
spec:
  project: demo
  source:
    repoURL: 'https://github.com/ssh-jmartinez/ocp-fullstack-gitops-delivery.git'
    targetRevision: HEAD
    path: k8s-manifests/01-core/database
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: demo
  syncPolicy:
    automated:
      prune: true
      selfHeal: true