apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root-fullstack-app
  namespace: openshift-gitops 
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: demo
  source:
    repoURL: 'https://github.com/Miguel-Moises-Valdez-Avila/openshift-gitops-enterprise-delivery.git'
    targetRevision: HEAD
    path: argocd-apps/templates 
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: demo
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true