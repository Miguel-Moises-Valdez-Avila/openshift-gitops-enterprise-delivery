apiVersion: apps/v1
kind: Rollout
metadata:
  name: demo-frontend
  namespace: demo
spec:
  replicas: 4
  selector:
    matchLabels:
      app: demo-frontend
  template:
    metadata:
      labels:
        app: demo-frontend
    spec:
      containers:
      - name: web
        image: image-registry.openshift-image-registry.svc:5000/demo/mi-web:latest
        ports:
        - containerPort: 8080
        resources:
          limits:
            cpu: 200m
            memory: 256Mi
          requests:
            cpu: 100m
            memory: 128Mi
  strategy:
    canary:
      canaryService: demo-frontend-canary # Apunta a tu service existente
      stableService: demo-frontend
      steps:
      - setWeight: 25   # 1 pod nuevo (V2), 3 pods viejos (V1)
      - pause: {}       # Pausa manual para verificar
      - setWeight: 50   # 2 pods nuevos, 2 viejos
      - pause: {duration: 1m}
      - setWeight: 100  # Finaliza
---
apiVersion: v1
kind: Service
metadata:
  name: demo-frontend-service
  namespace: demo
spec:
  selector:
    app: demo-frontend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: demo-frontend-canary
  namespace: demo
spec:
  selector:
    app: demo-frontend
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: demo-frontend-route
  namespace: demo
spec:
  to:
    kind: Service
    name: demo-frontend-service
  port:
    targetPort: 8080
